<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DSA Quiz – 500 MCQ Questions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:#1e293b;padding:1rem 2rem;border-bottom:2px solid #3b82f6;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
header h1{font-size:1.4rem;color:#60a5fa}
#controls{display:flex;gap:.5rem;flex-wrap:wrap;padding:1rem 2rem;background:#1e293b;border-bottom:1px solid #334155}
select,button{padding:.4rem .8rem;border-radius:.4rem;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:.85rem;cursor:pointer}
button:hover{background:#3b82f6;border-color:#3b82f6}
#stats{padding:.5rem 2rem;background:#162032;font-size:.85rem;color:#94a3b8;display:flex;gap:1.5rem;flex-wrap:wrap;border-bottom:1px solid #1e293b}
#quiz-area{padding:1.5rem 2rem;max-width:900px;margin:0 auto}
.question-card{background:#1e293b;border-radius:.75rem;padding:1.5rem;margin-bottom:1.5rem;border-left:4px solid #3b82f6;position:relative}
.question-card.correct{border-left-color:#22c55e}
.question-card.wrong{border-left-color:#ef4444}
.q-header{display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem;flex-wrap:wrap}
.q-num{font-size:.75rem;background:#0f172a;padding:.2rem .5rem;border-radius:.3rem;color:#64748b}
.q-topic{font-size:.75rem;background:#1d4ed8;padding:.2rem .5rem;border-radius:.3rem;color:#bfdbfe}
.q-diff{font-size:.75rem;padding:.2rem .5rem;border-radius:.3rem}
.q-diff.Easy{background:#14532d;color:#86efac}
.q-diff.Medium{background:#713f12;color:#fde68a}
.q-diff.Hard{background:#7f1d1d;color:#fca5a5}
.question-text{font-size:1rem;line-height:1.6;margin-bottom:1rem;color:#f1f5f9}
.options{display:grid;gap:.5rem}
.option-btn{text-align:left;padding:.6rem 1rem;border-radius:.4rem;border:1px solid #334155;background:#0f172a;color:#cbd5e1;cursor:pointer;transition:all .2s;font-size:.9rem}
.option-btn:hover:not(:disabled){background:#1d4ed8;border-color:#3b82f6;color:#fff}
.option-btn.selected{background:#1e40af;border-color:#60a5fa;color:#fff}
.option-btn.correct-ans{background:#166534;border-color:#22c55e;color:#dcfce7}
.option-btn.wrong-ans{background:#991b1b;border-color:#ef4444;color:#fee2e2}
.explanation{margin-top:.75rem;padding:.75rem;background:#0f172a;border-radius:.4rem;font-size:.85rem;color:#94a3b8;display:none}
.explanation.show{display:block}
#score-board{text-align:center;padding:2rem;background:#1e293b;border-radius:.75rem;margin:1rem 2rem}
#score-board h2{font-size:2rem;color:#60a5fa}
#score-board p{margin:.5rem 0;color:#94a3b8}
.progress-bar{width:100%;height:8px;background:#334155;border-radius:4px;overflow:hidden;margin:.5rem 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .3s}
</style>
</head>
<body>
<header>
  <h1>🧠 DSA MCQ Quiz – 500 Questions</h1>
  <div id="score-display" style="font-size:.9rem;color:#94a3b8">Score: <span id="sc">0</span> / <span id="tot">0</span></div>
</header>
<div id="controls">
  <select id="topicFilter"><option value="All">All Topics</option></select>
  <select id="diffFilter"><option value="All">All Difficulties</option><option>Easy</option><option>Medium</option><option>Hard</option></select>
  <button onclick="applyFilters()">Filter</button>
  <button onclick="shuffleAndReset()">🔀 Shuffle</button>
  <button onclick="resetAll()">↺ Reset All</button>
  <button onclick="showScore()">📊 Score</button>
</div>
<div id="stats">
  <span>Showing: <b id="showing">0</b> questions</span>
  <span>Answered: <b id="answered">0</b></span>
  <span>Correct: <b id="correct-count">0</b></span>
  <span>Wrong: <b id="wrong-count">0</b></span>
</div>
<div id="quiz-area"></div>

<script>
const ALL_QUESTIONS = [
// ─── ARRAYS ──────────────────────────────────────────────────────────────────
{t:"Arrays",d:"Easy",q:"What is the time complexity of accessing an element by index in an array?",o:["O(n)","O(log n)","O(1)","O(n²)"],a:2,e:"Array elements are stored contiguously in memory, so direct index access is O(1)."},
{t:"Arrays",d:"Easy",q:"Which of the following is NOT a valid operation on a static array?",o:["Access by index","Dynamic resizing","Traverse","Search"],a:1,e:"Static arrays have fixed size; dynamic resizing is a feature of dynamic arrays or lists."},
{t:"Arrays",d:"Easy",q:"What is the worst-case time complexity for linear search in an unsorted array?",o:["O(1)","O(log n)","O(n)","O(n log n)"],a:2,e:"In the worst case you inspect every element, giving O(n)."},
{t:"Arrays",d:"Easy",q:"In a 0-indexed array of size n, what is the index of the last element?",o:["n","n-1","n+1","n/2"],a:1,e:"0-indexed arrays run from index 0 to n-1."},
{t:"Arrays",d:"Easy",q:"Which operation shifts all elements one position to the right?",o:["Append","Insert at beginning","Delete last","Swap"],a:1,e:"Inserting at the beginning requires shifting all existing elements right by one position."},
{t:"Arrays",d:"Easy",q:"What is the space complexity of an array of n elements?",o:["O(1)","O(log n)","O(n)","O(n²)"],a:2,e:"Storing n elements requires O(n) space."},
{t:"Arrays",d:"Easy",q:"Which sorting algorithm has best-case O(n) for nearly-sorted arrays?",o:["Selection Sort","Bubble Sort","Quick Sort","Merge Sort"],a:1,e:"Bubble Sort with early termination detects a sorted array in O(n) passes."},
{t:"Arrays",d:"Medium",q:"Two Sum problem: given an unsorted array, find two indices summing to target. Best approach?",o:["Nested loops O(n²)","Sort then binary search O(n log n)","Hash map O(n)","Two pointers O(n log n)"],a:2,e:"A hash map stores complements for O(1) lookup, giving overall O(n) time."},
{t:"Arrays",d:"Medium",q:"What does the sliding window technique optimize?",o:["Sorting arrays","Finding subarrays satisfying a condition","Binary search","Graph traversal"],a:1,e:"Sliding window maintains a window over the array, avoiding redundant recomputation."},
{t:"Arrays",d:"Medium",q:"Kadane's algorithm solves which problem?",o:["Maximum subarray sum","Minimum subarray","Two sum","Rotate array"],a:0,e:"Kadane's algorithm finds the contiguous subarray with maximum sum in O(n)."},
{t:"Arrays",d:"Medium",q:"To find duplicates in an array of n integers (values 1 to n) in O(n) time and O(1) space, which technique works?",o:["Hash set","Sorting","Index negation marking","Two pointers"],a:2,e:"Negate values at visited indices to mark presence without extra space."},
{t:"Arrays",d:"Medium",q:"What is the time complexity of rotating an array by k positions using the reversal algorithm?",o:["O(n²)","O(n)","O(k)","O(n log n)"],a:1,e:"Three reversals each take O(n), so total is O(n)."},
{t:"Arrays",d:"Medium",q:"Which approach finds the majority element (>n/2 occurrences) in O(n) time and O(1) space?",o:["Hash map","Sorting","Boyer-Moore Voting","Two pointers"],a:2,e:"Boyer-Moore Voting tracks a candidate and count, achieving O(n) time, O(1) space."},
{t:"Arrays",d:"Medium",q:"To merge two sorted arrays in O(n+m) time without extra space, which pointer strategy is used?",o:["Start from beginning of both","Start from end of both","Random access","Use a stack"],a:1,e:"Starting from the end avoids element shifting and fills in place."},
{t:"Arrays",d:"Hard",q:"Trapping rain water problem: what is the time complexity of the two-pointer approach?",o:["O(n²)","O(n log n)","O(n)","O(1)"],a:2,e:"Two pointers converge in one pass: O(n)."},
{t:"Arrays",d:"Hard",q:"The 'Jump Game II' problem asks for minimum jumps to reach end. What is the greedy approach complexity?",o:["O(n²)","O(n)","O(n log n)","O(2^n)"],a:1,e:"Greedy tracks the farthest reachable position in one pass: O(n)."},
{t:"Arrays",d:"Hard",q:"Given an array, find all triplets summing to zero (3Sum). What is the time complexity of the sort + two-pointer approach?",o:["O(n)","O(n log n)","O(n²)","O(n³)"],a:2,e:"Sorting is O(n log n), then for each element a two-pointer scan is O(n), total O(n²)."},
{t:"Arrays",d:"Easy",q:"Which data structure is most appropriate when you need O(1) random access by index?",o:["Linked List","Hash Map","Array","Binary Tree"],a:2,e:"Arrays provide O(1) random access by index."},
{t:"Arrays",d:"Easy",q:"What is the time complexity of deleting the last element of an array?",o:["O(1)","O(n)","O(log n)","O(n²)"],a:0,e:"Removing the last element just decrements the size pointer: O(1)."},
{t:"Arrays",d:"Medium",q:"The Dutch National Flag algorithm solves which problem?",o:["Two Sum","Sort array of 0s, 1s, and 2s","Maximum subarray","Binary search"],a:1,e:"DNF partitions array into three groups in O(n) with O(1) extra space."},
{t:"Arrays",d:"Medium",q:"Prefix sum array helps answer range sum queries in?",o:["O(n) per query","O(1) per query after O(n) preprocessing","O(log n) per query","O(n²) total"],a:1,e:"Precompute prefix sums in O(n), then each range query is O(1)."},
{t:"Arrays",d:"Hard",q:"What is the time complexity of finding the median of two sorted arrays?",o:["O(n+m)","O((n+m) log(n+m))","O(log(min(n,m)))","O(n log m)"],a:2,e:"Binary search on the smaller array gives O(log(min(n,m)))."},
{t:"Arrays",d:"Easy",q:"Which of the following correctly describes a 2D array in memory?",o:["Stored as a linked list of rows","Stored as a contiguous block (row-major or column-major)","Stored as a binary tree","Stored in random locations"],a:1,e:"2D arrays are stored contiguously in row-major or column-major order."},
{t:"Arrays",d:"Medium",q:"Binary search on a sorted array has time complexity:",o:["O(n)","O(log n)","O(1)","O(n log n)"],a:1,e:"Binary search halves the search space each step: O(log n)."},
{t:"Arrays",d:"Medium",q:"To find the next permutation of an array, what is the time complexity?",o:["O(1)","O(log n)","O(n)","O(n!)"],a:2,e:"Finding the next permutation requires at most two linear scans and a reverse: O(n)."},
{t:"Arrays",d:"Hard",q:"Largest rectangle in histogram problem: what is the time complexity of the stack-based solution?",o:["O(n²)","O(n log n)","O(n)","O(log n)"],a:2,e:"A single pass with a stack processes each bar at most twice: O(n)."},
{t:"Arrays",d:"Easy",q:"What does in-place array reversal require in extra space?",o:["O(n)","O(1)","O(log n)","O(n/2)"],a:1,e:"Swapping elements from both ends requires only a temporary variable: O(1)."},
{t:"Arrays",d:"Medium",q:"Spiral matrix traversal visits how many elements?",o:["n","n²","2n","n log n"],a:1,e:"All n² elements of an n×n matrix are visited exactly once."},
{t:"Arrays",d:"Medium",q:"Which algorithm finds the kth largest element in an unsorted array in average O(n)?",o:["Merge Sort","Binary Search","QuickSelect","Bubble Sort"],a:2,e:"QuickSelect uses partitioning to find the kth element in average O(n)."},
{t:"Arrays",d:"Hard",q:"Count of smaller numbers after self: which data structure gives O(n log n) solution?",o:["Stack","Queue","Binary Indexed Tree (BIT/Fenwick)","Hash Map"],a:2,e:"A Fenwick tree allows prefix sum queries in O(log n), total O(n log n)."},
{t:"Arrays",d:"Easy",q:"What is the result of arr[i] = arr[j]; arr[j] = arr[i]; (no temp variable) swap?",o:["Correct swap","arr[i] = arr[j], arr[j] = original arr[i]","arr[i] = arr[j], arr[j] = arr[j]","Undefined behavior"],a:2,e:"After arr[i]=arr[j], both hold the same value, so arr[j]=arr[i] is a no-op; no proper swap."},
{t:"Arrays",d:"Medium",q:"Product of array except self without division in O(n): what is needed?",o:["Two passes (prefix and suffix products)","Sorting","Binary search","Stack"],a:0,e:"Compute prefix products left-to-right and suffix products right-to-left, multiply them."},
{t:"Arrays",d:"Hard",q:"Minimum window substring problem time complexity (sliding window)?",o:["O(n²)","O(n*m)","O(n)","O(n log n)"],a:2,e:"Two pointers over the string with a character count map: O(n)."},
{t:"Arrays",d:"Easy",q:"If an array has n elements and you access index n, what happens?",o:["Returns 0","Returns last element","Index out of bounds error","Returns garbage"],a:2,e:"Accessing index n (0-indexed) is out of bounds."},
{t:"Arrays",d:"Medium",q:"Find single number in array where every other element appears twice. Best approach?",o:["Hash set","Sort and scan","XOR all elements","Counting sort"],a:2,e:"XOR of identical numbers is 0, leaving only the single number. O(n) time, O(1) space."},
{t:"Arrays",d:"Easy",q:"Which of the following is true about dynamic arrays (like ArrayList)?",o:["Fixed size","Amortized O(1) append","Always O(n) append","Never resizes"],a:1,e:"Dynamic arrays double in size on overflow, giving amortized O(1) append."},
{t:"Arrays",d:"Medium",q:"Find missing number in array of 1..n in O(n) without extra space?",o:["XOR approach","Sort and scan","Hash set","Prefix sum"],a:0,e:"XOR all indices and values; the missing number remains after cancellation."},
{t:"Arrays",d:"Hard",q:"Longest consecutive sequence in unsorted array. O(n) approach uses?",o:["Sorting","Two pointers","Hash set for O(1) lookup","Binary search tree"],a:2,e:"Store all values in a hash set; start sequences only from elements with no left neighbor."},
{t:"Arrays",d:"Medium",q:"Maximum product subarray problem: what extra state must be tracked compared to Kadane's?",o:["Only max product","Only min product","Both max and min product (negatives flip signs)","Sum"],a:2,e:"A large negative times a small negative becomes a large positive, so both max and min must be tracked."},
{t:"Arrays",d:"Easy",q:"Time complexity of copying one array into another?",o:["O(1)","O(n)","O(log n)","O(n²)"],a:1,e:"Copying n elements is O(n)."},
{t:"Arrays",d:"Easy",q:"Which Python built-in sorts a list in-place in O(n log n)?",o:["list.sort()","sorted()","list.reverse()","list.index()"],a:0,e:"list.sort() sorts in-place using Timsort: O(n log n)."},
{t:"Arrays",d:"Medium",q:"Container with most water (two pointers). Why do we move the pointer with the shorter height?",o:["To increase width","Moving the taller side can only decrease area","Random choice","Shorter side limits height; moving it may find a taller boundary"],a:3,e:"The shorter side is the bottleneck; moving the taller side cannot improve the minimum height."},
{t:"Arrays",d:"Hard",q:"Subarray sum equals k. Optimal time complexity?",o:["O(n²)","O(n)","O(n log n)","O(k)"],a:1,e:"Prefix sum + hash map stores cumulative sums, detecting target sum in O(1) per step."},
{t:"Arrays",d:"Medium",q:"In-place matrix rotation (90° clockwise): what two steps are needed?",o:["Reverse rows, then transpose","Transpose, then reverse each row","Reverse columns, then rows","Sort each row"],a:1,e:"Transpose flips axes; reversing each row achieves 90° clockwise rotation."},
{t:"Arrays",d:"Easy",q:"What is the index of the middle element in binary search for array of n elements?",o:["n/2","(low+high)/2","(low+high+1)/2","n-1"],a:1,e:"Middle index is (low+high)/2 (integer division)."},
{t:"Arrays",d:"Hard",q:"Median of a stream of integers — which data structure pair gives O(log n) insertion and O(1) median?",o:["Two queues","Two stacks","Max-heap + min-heap","Balanced BST + array"],a:2,e:"A max-heap (lower half) and min-heap (upper half) keep the median at their tops."},
{t:"Arrays",d:"Easy",q:"Given a sorted array, binary search returns -1 when?",o:["Target equals middle","Target is not found","Array is empty","Target is at index 0"],a:1,e:"Binary search returns -1 (or sentinel) when the target is absent from the array."},
{t:"Arrays",d:"Medium",q:"Find all permutations of an array. Time complexity?",o:["O(n)","O(n log n)","O(n!)","O(2^n)"],a:2,e:"There are n! permutations; generating all requires O(n!) time."},

// ─── LINKED LISTS ─────────────────────────────────────────────────────────────
{t:"Linked Lists",d:"Easy",q:"What is the time complexity of inserting a node at the head of a singly linked list?",o:["O(n)","O(log n)","O(1)","O(n²)"],a:2,e:"Inserting at head just requires updating the head pointer: O(1)."},
{t:"Linked Lists",d:"Easy",q:"How do you detect a cycle in a linked list efficiently?",o:["Use a hash set","Count nodes","Floyd's cycle detection (slow/fast pointers)","Reverse the list"],a:2,e:"Floyd's algorithm uses two pointers moving at different speeds; if they meet, there's a cycle."},
{t:"Linked Lists",d:"Easy",q:"What is the time complexity of finding the middle of a singly linked list?",o:["O(1)","O(n)","O(log n)","O(n²)"],a:1,e:"We need to traverse at least half the list: O(n)."},
{t:"Linked Lists",d:"Easy",q:"Which operation requires traversal of the entire linked list?",o:["Insert at head","Delete head","Access last element","Check if empty"],a:2,e:"Singly linked lists have no tail reference by default; accessing the last node is O(n)."},
{t:"Linked Lists",d:"Easy",q:"In a doubly linked list, each node contains?",o:["Data and next pointer","Data, next, and previous pointers","Only a data field","Data and two data fields"],a:1,e:"Doubly linked list nodes have pointers to both next and previous nodes."},
{t:"Linked Lists",d:"Medium",q:"Reversing a singly linked list iteratively requires how many pointers?",o:["1","2","3","4"],a:2,e:"Three pointers (prev, curr, next) are needed to reverse links iteratively."},
{t:"Linked Lists",d:"Medium",q:"To find the nth node from the end in one pass, use?",o:["Recursion","Two pointers n apart","Hash map of positions","Stack"],a:1,e:"Move one pointer n steps ahead, then advance both until the first reaches end."},
{t:"Linked Lists",d:"Medium",q:"What is the time complexity of merging two sorted linked lists?",o:["O(n log n)","O(n+m)","O(n*m)","O(n²)"],a:1,e:"Scan both lists once, merging in order: O(n+m)."},
{t:"Linked Lists",d:"Medium",q:"Detect the start of a cycle in a linked list (Floyd's). After fast and slow meet, what next?",o:["Move slow to head, advance both one step until they meet","Reverse the list","Count cycle length","Use a stack"],a:0,e:"Reset one pointer to head; when both advance at speed 1, they meet at cycle start."},
{t:"Linked Lists",d:"Medium",q:"LRU Cache uses which combination of data structures for O(1) get and put?",o:["Array + heap","Hash map + doubly linked list","Binary tree + array","Stack + queue"],a:1,e:"Hash map gives O(1) access; doubly linked list maintains recency order with O(1) insert/delete."},
{t:"Linked Lists",d:"Easy",q:"What happens when you delete the only node in a linked list?",o:["Node is freed, head becomes null","Node is freed, head stays","Error occurs","List doubles"],a:0,e:"The head pointer is set to null; the list becomes empty."},
{t:"Linked Lists",d:"Medium",q:"Add two numbers represented as linked lists (digits in reverse). What is the time complexity?",o:["O(n+m)","O(max(n,m))","O(n*m)","O(n log n)"],a:1,e:"You traverse both lists simultaneously, so O(max(n,m))."},
{t:"Linked Lists",d:"Hard",q:"Reverse nodes in k-group. Time complexity?",o:["O(n)","O(n/k)","O(k)","O(n²)"],a:0,e:"Each node is visited and reversed once: O(n)."},
{t:"Linked Lists",d:"Medium",q:"Clone a linked list with random pointers. Optimal space complexity?",o:["O(n)","O(1)","O(log n)","O(n²)"],a:1,e:"Interleaving original and cloned nodes allows O(1) extra space (not counting output)."},
{t:"Linked Lists",d:"Easy",q:"Which pointer in a singly linked list's last node is set to?",o:["Itself","The head","null","Previous node"],a:2,e:"The last node's next pointer is null to signal end of list."},
{t:"Linked Lists",d:"Medium",q:"Palindrome linked list check in O(n) time, O(1) space: approach?",o:["Hash map characters","Reverse second half and compare","Use a stack","Convert to array"],a:1,e:"Find mid, reverse second half, compare; then optionally restore."},
{t:"Linked Lists",d:"Hard",q:"Merge k sorted linked lists. Optimal time complexity?",o:["O(n*k)","O(n*k²)","O(nk log k)","O(n log k)"],a:3,e:"Using a min-heap of size k, each of the nk total nodes is processed in O(log k): O(nk log k). Often written O(n log k) where n is total nodes."},
{t:"Linked Lists",d:"Medium",q:"Odd-even linked list (group odd-indexed then even-indexed nodes). Time complexity?",o:["O(n)","O(n log n)","O(n²)","O(1)"],a:0,e:"One pass through the list rewiring pointers: O(n)."},
{t:"Linked Lists",d:"Easy",q:"A circular linked list's last node points to?",o:["null","The head","The second node","Itself"],a:1,e:"In a circular linked list, the last node points back to the head."},
{t:"Linked Lists",d:"Medium",q:"Swap nodes in pairs without modifying values. Extra space?",o:["O(n)","O(1)","O(log n)","O(n/2)"],a:1,e:"Pointer manipulation only requires O(1) extra space."},
{t:"Linked Lists",d:"Hard",q:"What is the time complexity of sorting a linked list?",o:["O(n log n)","O(n²)","O(n)","O(n log² n)"],a:0,e:"Merge sort on a linked list achieves O(n log n) with O(log n) stack space."},
{t:"Linked Lists",d:"Easy",q:"Inserting a node after a given node in a linked list is?",o:["O(1)","O(n)","O(log n)","O(n²)"],a:0,e:"Given a reference to the node, insertion requires only pointer updates: O(1)."},
{t:"Linked Lists",d:"Medium",q:"Remove duplicates from unsorted linked list. O(n) approach uses?",o:["Sorting","Two pointers","Hash set","Counting array"],a:2,e:"A hash set tracks seen values; duplicates are removed in one pass: O(n)."},
{t:"Linked Lists",d:"Easy",q:"What is a sentinel (dummy) node used for in linked list problems?",o:["Increase performance","Simplify edge cases at head/tail","Store extra data","Act as loop terminator"],a:1,e:"A dummy head node eliminates special-casing for operations at the head."},
{t:"Linked Lists",d:"Medium",q:"Intersection of two linked lists (same node by reference). Approach?",o:["Hash set of visited nodes","Equalize lengths then advance both","Convert to arrays and compare","Reverse both"],a:1,e:"Calculate lengths, advance the longer list's pointer, then traverse both until they meet."},
{t:"Linked Lists",d:"Hard",q:"Flatten a multilevel doubly linked list. Time complexity?",o:["O(n)","O(n²)","O(n log n)","O(n*m)"],a:0,e:"Each node is visited once when flattened with a stack: O(n) where n is total nodes."},
{t:"Linked Lists",d:"Easy",q:"Which of the following list operations is O(n) for singly linked list?",o:["Insert at head","Delete head","Search by value","Check if empty"],a:2,e:"Searching requires traversing up to all nodes: O(n)."},
{t:"Linked Lists",d:"Medium",q:"Rotate linked list by k places to the right. What must be found first?",o:["The middle node","The length and new tail position","The kth node from end","The cycle"],a:1,e:"Find length n, compute new tail at position n - (k % n) - 1, then re-link."},
{t:"Linked Lists",d:"Easy",q:"In-place list deletion without knowing head: copy next node's data?",o:["True – copy data from next and delete next","False – impossible","True – but requires two passes","False – need to traverse from head"],a:0,e:"Copy the next node's value into the current node, then bypass the next node."},
{t:"Linked Lists",d:"Medium",q:"Partition linked list around value x (all < x before >= x). Time complexity?",o:["O(1)","O(n)","O(n log n)","O(n²)"],a:1,e:"One pass building two sub-lists and joining them: O(n)."},
{t:"Linked Lists",d:"Hard",q:"Design linked list supporting push_front, push_back, pop_front, pop_back all in O(1)?",o:["Singly linked list with head","Singly linked list with head and tail","Doubly linked list with head and tail","Array"],a:2,e:"A doubly linked list with sentinel head and tail pointers supports all four operations in O(1)."},
{t:"Linked Lists",d:"Easy",q:"What is a skip list's advantage over a standard linked list?",o:["O(1) search","O(log n) average search","Less memory","Simpler code"],a:1,e:"Skip lists add express lanes for O(log n) average search, insert, and delete."},
{t:"Linked Lists",d:"Medium",q:"Josephus problem on a circular linked list with n people, every kth eliminated. Time complexity?",o:["O(n)","O(n*k)","O(n log n)","O(k)"],a:0,e:"Simulation traverses the circular list eliminating n elements: O(n) for k=2 or O(nk) generally; mathematical solution is O(n)."},
{t:"Linked Lists",d:"Easy",q:"Compared to an array, the main disadvantage of a linked list is?",o:["Slower insertion at head","No random access by index","Cannot store data","Higher insertion cost"],a:1,e:"Linked lists require O(n) traversal to reach a node by index."},

{t:"Stacks & Queues",d:"Hard",q:"Trapping rain water with a stack approach. Time complexity?",o:["O(n²)","O(n)","O(n log n)","O(n/2)"],a:1,e:"Each bar is pushed and popped once: O(n)."},

{t:"Stacks & Queues",d:"Easy",q:"Which of the following is a valid stack implementation?",o:["Array with push/pop at end","Linked list with insert/remove at tail","Both A and B","Neither"],a:2,e:"Both array (push at end) and linked list (insert/remove at head) are valid stack implementations."},

{t:"Stacks & Queues",d:"Hard",q:"Maximum frequency stack (FreqStack). Time complexity of push and pop?",o:["O(log n)","O(n)","O(1)","O(n log n)"],a:2,e:"Using a hash map of frequency to stack, both push and pop are O(1)."},
{t:"Stacks & Queues",d:"Easy",q:"How does recursion use a stack internally?",o:["Function calls are stored in a call stack","Recursion uses a heap","Loop counters are stacked","Local variables are queued"],a:0,e:"Each recursive call pushes a frame onto the call stack; returns pop frames."},
{t:"Stacks & Queues",d:"Medium",q:"Score of parentheses problem: '()' scores 1, '(A)' scores 2*A, concatenation adds. Which structure?",o:["Queue","Stack","Deque","Heap"],a:1,e:"A stack accumulates scores as parentheses are processed and merged."},
{t:"Stacks & Queues",d:"Hard",q:"Largest rectangle in skyline (buildings with widths). Extension of histogram problem. Time complexity?",o:["O(n)","O(n²)","O(n log n)","O(n log² n)"],a:0,e:"Flattening to histogram then applying monotonic stack: O(n)."},

{t:"Stacks & Queues",d:"Medium",q:"Implement a queue using only one stack. Dequeue operation worst-case time complexity?",o:["O(1)","O(n)","O(log n)","O(n²)"],a:1,e:"Each dequeue may require moving all n elements: O(n) worst case (O(1) amortized with two stacks)."},
{t:"Stacks & Queues",d:"Easy",q:"What does FIFO stand for?",o:["First In First Out","Final Input Final Output","First Input Final Output","First In Final Order"],a:0,e:"FIFO: First In First Out — the first enqueued element is the first dequeued."},

// ─── TREES & BINARY TREES ─────────────────────────────────────────────────────
{t:"Trees",d:"Easy",q:"What is the height of a binary tree with a single node?",o:["0","1","-1","2"],a:0,e:"A single node has height 0 (no edges from root to leaf)."},

{t:"Trees",d:"Hard",q:"Binary tree maximum path sum (path can go through any nodes). Time complexity?",o:["O(n)","O(n²)","O(n log n)","O(2^n)"],a:0,e:"Post-order DFS visits each node once: O(n)."},

{t:"Trees",d:"Hard",q:"Vertical order traversal of binary tree. Time complexity?",o:["O(n)","O(n log n)","O(n²)","O(n log² n)"],a:1,e:"Sorting by (column, row, value) for n nodes: O(n log n)."},

// ─── GRAPHS ───────────────────────────────────────────────────────────────────
{t:"Graphs",d:"Easy",q:"What is the time complexity of BFS on a graph with V vertices and E edges?",o:["O(V)","O(E)","O(V+E)","O(V*E)"],a:2,e:"BFS visits every vertex and edge once: O(V+E)."},
{t:"Graphs",d:"Easy",q:"What is the time complexity of DFS on a graph with V vertices and E edges?",o:["O(V)","O(E)","O(V+E)","O(V²)"],a:2,e:"DFS visits every vertex and edge once: O(V+E)."},

{t:"Graphs",d:"Medium",q:"Dijkstra's algorithm with a binary heap has time complexity?",o:["O(V²)","O(E log V)","O(V log E)","O(V+E)"],a:1,e:"Each edge relaxation is O(log V) with a binary heap: O(E log V)."},

{t:"Graphs",d:"Medium",q:"Floyd-Warshall algorithm solves?",o:["Single-source shortest path","All-pairs shortest path","MST","Topological sort"],a:1,e:"Floyd-Warshall computes shortest paths between all pairs in O(V³)."},

{t:"Graphs",d:"Hard",q:"Tarjan's algorithm finds strongly connected components (SCCs) in?",o:["O(V+E)","O(V²)","O(E log V)","O(V log V)"],a:0,e:"Tarjan's DFS-based algorithm processes each vertex and edge once: O(V+E)."},
{t:"Graphs",d:"Easy",q:"An undirected graph is bipartite if and only if it contains?",o:["No cycles","No odd-length cycles","No edges","Exactly two vertices"],a:1,e:"A graph is bipartite iff it has no odd-length cycles (2-colorable)."},

{t:"Graphs",d:"Medium",q:"Number of islands problem. Which traversal marks visited cells?",o:["DFS or BFS flood fill","Topological sort","Dijkstra","Union-Find only"],a:0,e:"DFS or BFS floods connected land cells to count and mark islands."},

{t:"Graphs",d:"Medium",q:"Clone a graph with N nodes and E edges. Time complexity?",o:["O(N)","O(N+E)","O(E)","O(N²)"],a:1,e:"BFS/DFS visits every node and edge once: O(N+E)."},

// ─── State ─────────────────────────────────────────────────────────────────────
let filtered = [...ALL_QUESTIONS];
let answers = {}; // index in filtered → chosen option index
let correct = 0, wrong = 0;

// Populate topic filter
const topics = [...new Set(ALL_QUESTIONS.map(q=>q.t))];
const tf = document.getElementById('topicFilter');
topics.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tf.appendChild(o);});

function applyFilters(){
  const top=document.getElementById('topicFilter').value;
  const dif=document.getElementById('diffFilter').value;
  filtered=ALL_QUESTIONS.filter(q=>(top==='All'||q.t===top)&&(dif==='All'||q.d===dif));
  answers={};correct=0;wrong=0;
  renderAll();
}

function shuffleAndReset(){
  const top=document.getElementById('topicFilter').value;
  const dif=document.getElementById('diffFilter').value;
  filtered=ALL_QUESTIONS.filter(q=>(top==='All'||q.t===top)&&(dif==='All'||q.d===dif));
  for(let i=filtered.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[filtered[i],filtered[j]]=[filtered[j],filtered[i]];}
  answers={};correct=0;wrong=0;
  renderAll();
}

function resetAll(){
  document.getElementById('topicFilter').value='All';
  document.getElementById('diffFilter').value='All';
  filtered=[...ALL_QUESTIONS];
  answers={};correct=0;wrong=0;
  renderAll();
}

function showScore(){
  const total=filtered.length;
  const ans=Object.keys(answers).length;
  alert(`Score: ${correct}/${ans} answered (${total} total)\nCorrect: ${correct}  Wrong: ${wrong}  Unanswered: ${total-ans}`);
}

function renderAll(){
  const area=document.getElementById('quiz-area');
  area.innerHTML='';
  updateStats();
  filtered.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='question-card';
    card.id='card-'+i;
    const state=answers[i];
    if(state!==undefined){card.classList.add(state===q.a?'correct':'wrong');}
    card.innerHTML=`
      <div class="q-header">
        <span class="q-num">#${i+1}</span>
        <span class="q-topic">${q.t}</span>
        <span class="q-diff ${q.d}">${q.d}</span>
      </div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="opts-${i}">
        ${q.o.map((opt,oi)=>`<button class="option-btn${state!==undefined?(oi===q.a?' correct-ans':(oi===state?' wrong-ans':'')):(state===oi?' selected':'')}" onclick="choose(${i},${oi})" ${state!==undefined?'disabled':''}>${opt}</button>`).join('')}
      </div>
      <div class="explanation${state!==undefined?' show':''}" id="exp-${i}">💡 ${q.e}</div>`;
    area.appendChild(card);
  });
}

function choose(qi,oi){
  if(answers[qi]!==undefined)return;
  answers[qi]=oi;
  const q=filtered[qi];
  const card=document.getElementById('card-'+qi);
  if(oi===q.a){correct++;card.classList.add('correct');}
  else{wrong++;card.classList.add('wrong');}
  const btns=document.querySelectorAll(`#opts-${qi} .option-btn`);
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(i===q.a)b.classList.add('correct-ans');
    else if(i===oi)b.classList.add('wrong-ans');
  });
  document.getElementById(`exp-${qi}`).classList.add('show');
  document.getElementById('sc').textContent=correct;
  document.getElementById('tot').textContent=Object.keys(answers).length;
  updateStats();
}

function updateStats(){
  document.getElementById('showing').textContent=filtered.length;
  document.getElementById('answered').textContent=Object.keys(answers).length;
  document.getElementById('correct-count').textContent=correct;
  document.getElementById('wrong-count').textContent=wrong;
}

renderAll();
</script>
