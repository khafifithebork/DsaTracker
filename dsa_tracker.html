<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Pattern Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f7916a;
    --accent3: #6af7b8;
    --learn: #7c6af7;
    --practice: #f7c06a;
    --hard: #f7916a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --done-bg: #1a2a1a;
    --done-border: #2a4a2a;
    --done-text: #6af7b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  header {
    margin-bottom: 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .title-row {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    padding-bottom: 4px;
  }

  /* OVERALL PROGRESS */
  .overall-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat-learn .stat-num { color: var(--learn); }
  .stat-practice .stat-num { color: var(--practice); }
  .stat-hard .stat-num { color: var(--hard); }
  .stat-total .stat-num { color: var(--accent3); }

  /* GLOBAL PROGRESS BAR */
  .global-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .global-bar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }
  .global-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* PATTERN CARD */
  .pattern-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .pattern-card:hover { border-color: var(--accent); }
  .pattern-card.completed { border-color: var(--done-border); }

  .pattern-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .pattern-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 28px;
  }

  .pattern-name {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex: 1;
  }

  .pattern-progress {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mini-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .mini-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.3s;
  }
  .mini-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
  }

  .chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }
  .pattern-card.open .chevron { transform: rotate(180deg); }

  /* PATTERN BODY */
  .pattern-body {
    display: none;
    padding: 0 24px 24px;
  }
  .pattern-card.open .pattern-body { display: block; }

  /* PHASE SECTIONS */
  .phase-section {
    margin-bottom: 20px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .phase-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .phase-learn .phase-badge { background: rgba(124,106,247,0.15); color: var(--learn); border: 1px solid rgba(124,106,247,0.3); }
  .phase-practice .phase-badge { background: rgba(247,192,106,0.15); color: var(--practice); border: 1px solid rgba(247,192,106,0.3); }
  .phase-hard .phase-badge { background: rgba(247,145,106,0.15); color: var(--hard); border: 1px solid rgba(247,145,106,0.3); }

  .phase-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* PROBLEM ROWS */
  .problem-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .problem-row:hover { background: var(--surface2); }
  .problem-row.done { background: rgba(106,247,184,0.04); }

  .check-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 0.7rem;
  }
  .problem-row.done .check-box {
    background: var(--accent3);
    border-color: var(--accent3);
    color: #0a0a0f;
  }
  .phase-learn .problem-row.done .check-box { background: var(--learn); border-color: var(--learn); color: #fff; }
  .phase-practice .problem-row.done .check-box { background: var(--practice); border-color: var(--practice); color: #0a0a0f; }
  .phase-hard .problem-row.done .check-box { background: var(--hard); border-color: var(--hard); color: #fff; }

  .problem-content { flex: 1; min-width: 0; }

  .problem-name {
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .problem-row.done .problem-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .problem-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .diff-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .diff-easy { background: rgba(106,247,184,0.12); color: var(--accent3); }
  .diff-medium { background: rgba(247,192,106,0.12); color: var(--practice); }
  .diff-hard { background: rgba(247,145,106,0.12); color: var(--hard); }

  .lc-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .lc-link:hover { color: var(--accent); }

  /* TIPS */
  .tip-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--hard);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-decoration: underline dotted;
    transition: color 0.15s;
    margin-top: 2px;
    display: block;
  }
  .tip-toggle:hover { color: var(--accent2); }

  .tip-box {
    display: none;
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(247,145,106,0.07);
    border-left: 2px solid var(--hard);
    border-radius: 0 6px 6px 0;
    font-size: 0.75rem;
    color: var(--text);
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }
  .tip-box.visible { display: block; }

  /* PATTERN RECOGNITION */
  .pattern-recog-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-decoration: underline dotted;
    transition: color 0.15s;
    margin-top: 2px;
    display: inline-block;
  }
  .pattern-recog-toggle:hover { color: var(--learn); }

  .pattern-recog-box {
    display: none;
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(124,106,247,0.07);
    border-left: 2px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 0.75rem;
    color: var(--text);
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }
  .pattern-recog-box.visible { display: block; }

  .pattern-recog-box .recog-label {
    font-size: 0.6rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
    font-weight: 500;
  }

  .pattern-recog-box .recog-text {
    margin-bottom: 6px;
  }

  .linked-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(124,106,247,0.15);
    color: var(--accent);
    border: 1px solid rgba(124,106,247,0.3);
    display: inline-block;
    margin-right: 4px;
    margin-top: 2px;
  }

  /* RESET BTN */
  .reset-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--hard); color: var(--hard); }

  /* EXPAND ALL */
  .controls-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--text); }

  @media (max-width: 600px) {
    .pattern-header { padding: 16px; }
    .pattern-body { padding: 0 16px 16px; }
    .mini-bar { width: 50px; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-row">
      <h1>DSA Patterns</h1>
      <span class="subtitle">// 21 patterns · 20 problems each · 420 total</span>
    </div>
  </header>

  <div class="overall-stats">
    <div class="stat-box stat-learn">
      <div class="stat-num" id="stat-learn">0/147</div>
      <div class="stat-label">Learn Phase</div>
    </div>
    <div class="stat-box stat-practice">
      <div class="stat-num" id="stat-practice">0/210</div>
      <div class="stat-label">Practice Phase</div>
    </div>
    <div class="stat-box stat-hard">
      <div class="stat-num" id="stat-hard">0/63</div>
      <div class="stat-label">Challenge Phase</div>
    </div>
    <div class="stat-box stat-total">
      <div class="stat-num" id="stat-total">0/420</div>
      <div class="stat-label">Total Solved</div>
    </div>
  </div>

  <div class="global-bar-wrap">
    <span class="global-bar-label">OVERALL PROGRESS</span>
    <div class="bar-track"><div class="bar-fill" id="global-bar"></div></div>
    <span class="global-pct" id="global-pct">0%</span>
  </div>

  <div class="controls-row">
    <button class="ctrl-btn" onclick="expandAll()">↓ Expand All</button>
    <button class="ctrl-btn" onclick="collapseAll()">↑ Collapse All</button>
  </div>

  <div id="patterns-container"></div>
</div>

<script>
const PATTERNS = [
  {
    id: 1, name: "Sliding Window",
    learn: [
      { name: "Maximum Sum Subarray of Size K", diff: "easy", lc: 643, tip: null, pattern: "Find a value across a fixed-size contiguous subarray", intuition: "Use a sliding window of exactly K elements. Maintain a running sum by adding the rightmost element and removing the leftmost when the window slides.", linkedPractice: [5] },
      { name: "Longest Substring Without Repeating Characters", diff: "medium", lc: 3, tip: null, pattern: "Find the longest substring satisfying a uniqueness constraint", intuition: "Expand the window right. When a duplicate is found, shrink from the left past the previous occurrence. Use a hash set or map to track characters.", linkedPractice: [2] },
      { name: "Fruit Into Baskets", diff: "medium", lc: 904, tip: null, pattern: "Maximum subarray with at most K distinct elements", intuition: "Variable-size window with a frequency map. Shrink the window when distinct count exceeds K. Track the max window size.", linkedPractice: [3] },
      { name: "Permutation in String", diff: "medium", lc: 567, tip: null, pattern: "Check if one string's permutation exists as a substring of another", intuition: "Fixed-size window matching a character frequency. Slide window of size len(s1) over s2, comparing frequency counts at each position.", linkedPractice: [7] },
      { name: "Find All Anagrams in a String", diff: "medium", lc: 438, tip: null, pattern: "Find all starting positions where an anagram/permutation appears", intuition: "Same as permutation check but collect all valid window positions. Maintain a match counter that tracks how many character frequencies match.", linkedPractice: [8] },
      { name: "Longest Repeating Character Replacement", diff: "medium", lc: 424, tip: null, pattern: "Longest substring achievable with at most K modifications", intuition: "Window is valid when (window_size - max_freq_char) ≤ K. Expand right always, shrink left only when invalid. Track the highest frequency character.", linkedPractice: [0] },
      { name: "Longest Substring with At Most K Distinct Characters", diff: "medium", lc: 340, tip: null, pattern: "Find longest window with a bounded number of distinct elements", intuition: "Expand right, adding to a frequency map. When distinct count exceeds K, shrink left until constraint is met. Update max length at each valid state.", linkedPractice: [9] },
    ],
    practice: [
      { name: "Minimum Window Substring", diff: "hard", lc: 76, tip: null },
      { name: "Sliding Window Maximum", diff: "hard", lc: 239, tip: null },
      { name: "Max Consecutive Ones III", diff: "medium", lc: 1004, tip: null },
      { name: "Subarray Product Less Than K", diff: "medium", lc: 713, tip: null },
      { name: "Number of Subarrays with Bounded Maximum", diff: "medium", lc: 795, tip: null },
      { name: "Minimum Size Subarray Sum", diff: "medium", lc: 209, tip: null },
      { name: "Longest Turbulent Subarray", diff: "medium", lc: 978, tip: null },
      { name: "Binary Subarrays With Sum", diff: "medium", lc: 930, tip: null },
      { name: "Count Number of Nice Subarrays", diff: "medium", lc: 1248, tip: null },
      { name: "Minimum Operations to Reduce X to Zero", diff: "medium", lc: 1658, tip: null },
    ],
    hard: [
      { name: "Substring with Concatenation of All Words", diff: "hard", lc: 30, tip: "Use a sliding window of size word_len × num_words. At each step, extract a word and check against a frequency map. Reset when a bad word is encountered." },
      { name: "Minimum Window Subsequence", diff: "hard", lc: 727, tip: "Find the window using two-pointer forward scan (S→T), then shrink from the left to minimize. Repeat for every valid window found." },
      { name: "Subarrays with K Different Integers", diff: "hard", lc: 992, tip: "Use the trick: exactly K = atMost(K) - atMost(K-1). Each atMost call is a standard variable sliding window." },
    ]
  },
  {
    id: 2, name: "Prefix Sum",
    learn: [
      { name: "Range Sum Query - Immutable", diff: "easy", lc: 303, tip: null, pattern: "Repeatedly query the sum of a subarray range", intuition: "Precompute prefix sums. Answer any range [i,j] in O(1) as prefix[j+1] - prefix[i].", linkedPractice: [0] },
      { name: "Find Pivot Index", diff: "easy", lc: 724, tip: null, pattern: "Find a position where left sum equals right sum", intuition: "Compute total sum. Scan left-to-right tracking left sum. At each index, right sum = total - left - current. Check equality.", linkedPractice: [5] },
      { name: "Running Sum of 1d Array", diff: "easy", lc: 1480, tip: null, pattern: "Transform an array into its cumulative sum", intuition: "Iterate and accumulate: prefix[i] = prefix[i-1] + arr[i]. This is the building block for all prefix sum problems.", linkedPractice: [7] },
      { name: "Product of Array Except Self", diff: "medium", lc: 238, tip: null, pattern: "Compute a value for each element using all other elements", intuition: "Build left-product and right-product prefix arrays. Result[i] = leftProduct[i] × rightProduct[i]. Avoids division.", linkedPractice: [6] },
      { name: "Subarray Sum Equals K", diff: "medium", lc: 560, tip: null, pattern: "Count subarrays with a specific sum", intuition: "Use a hash map of prefix sums. At each index, check if (currentPrefix - K) exists in the map. That count gives valid subarrays ending here.", linkedPractice: [2] },
      { name: "Contiguous Array", diff: "medium", lc: 525, tip: null, pattern: "Find longest subarray with equal count of two values", intuition: "Replace 0s with -1s, then find longest subarray with sum 0. Use a hash map storing the first occurrence of each prefix sum.", linkedPractice: [3] },
      { name: "Subarray Sums Divisible by K", diff: "medium", lc: 974, tip: null, pattern: "Count subarrays whose sum satisfies a divisibility condition", intuition: "Two prefix sums with the same remainder mod K define a valid subarray. Count remainders using a hash map; use combination formula.", linkedPractice: [9] },
    ],
    practice: [
      { name: "Range Sum Query 2D - Immutable", diff: "medium", lc: 304, tip: null },
      { name: "Path Sum III", diff: "medium", lc: 437, tip: null },
      { name: "Maximum Size Subarray Sum Equals K", diff: "medium", lc: 325, tip: null },
      { name: "Continuous Subarray Sum", diff: "medium", lc: 523, tip: null },
      { name: "Count of Range Sum", diff: "hard", lc: 327, tip: null },
      { name: "Number of Ways to Split Array", diff: "medium", lc: 2270, tip: null },
      { name: "Ways to Make a Fair Array", diff: "medium", lc: 1664, tip: null },
      { name: "Minimum Average Difference", diff: "medium", lc: 2256, tip: null },
      { name: "Sum of Absolute Differences in a Sorted Array", diff: "medium", lc: 1685, tip: null },
      { name: "Make Sum Divisible by P", diff: "medium", lc: 1590, tip: null },
    ],
    hard: [
      { name: "Count of Smaller Numbers After Self", diff: "hard", lc: 315, tip: "Build prefix using merge sort or BIT. For each element, count inversions — elements to the right that are smaller." },
      { name: "Maximum Sum of 3 Non-Overlapping Subarrays", diff: "hard", lc: 689, tip: "Precompute prefix sums for all windows of size K. Then use left[] and right[] arrays storing best window index up to/from each position." },
      { name: "Number of Subarrays with Bounded Maximum", diff: "medium", lc: 795, tip: "Split on elements > R. Within segments, count subarrays with at least one element ≥ L using prefix logic: answer = f(R) - f(L-1)." },
    ]
  },
  {
    id: 3, name: "Two Pointers",
    learn: [
      { name: "Valid Palindrome", diff: "easy", lc: 125, tip: null, pattern: "Check symmetry by comparing elements from both ends", intuition: "Place pointers at start and end. Move inward, comparing characters. Skip non-alphanumeric characters.", linkedPractice: [5] },
      { name: "Two Sum II - Input Array Is Sorted", diff: "medium", lc: 167, tip: null, pattern: "Find a pair in a sorted array that satisfies a sum condition", intuition: "Left and right pointers. If sum too small, move left right. If too large, move right left. Sorted order guarantees convergence.", linkedPractice: [9] },
      { name: "Remove Duplicates from Sorted Array", diff: "easy", lc: 26, tip: null, pattern: "Remove duplicates in-place from a sorted sequence", intuition: "Slow pointer marks the write position. Fast pointer scans ahead. Write only when a new unique element is found.", linkedPractice: [2] },
      { name: "Move Zeroes", diff: "easy", lc: 283, tip: null, pattern: "Partition or rearrange elements in-place based on a condition", intuition: "Slow pointer tracks next non-zero position. Fast pointer scans all elements. Swap non-zero elements to the slow pointer position.", linkedPractice: [4] },

const STORAGE_KEY = 'dsa_tracker_v2';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function getProblemKey(patternId, phase, idx) {
  return `p${patternId}_${phase}_${idx}`;
}

function isChecked(patternId, phase, idx) {
  return !!state[getProblemKey(patternId, phase, idx)];
}

function toggleCheck(patternId, phase, idx) {
  const key = getProblemKey(patternId, phase, idx);
  state[key] = !state[key];
  saveState(state);
  render();
}

function countDone(patternId, phase, total) {
  let count = 0;
  for (let i = 0; i < total; i++) {
    if (isChecked(patternId, phase, i)) count++;
  }
  return count;
}

function countAllDone(patternId) {
  return countDone(patternId,'learn',7) + countDone(patternId,'practice',10) + countDone(patternId,'hard',3);
}

let openPatterns = new Set([1]); // first open by default

function render() {
  const container = document.getElementById('patterns-container');

  // Stats
  let totalLearn = 0, totalPractice = 0, totalHard = 0;
  PATTERNS.forEach(p => {
    totalLearn += countDone(p.id, 'learn', 7);
    totalPractice += countDone(p.id, 'practice', 10);
    totalHard += countDone(p.id, 'hard', 3);
  });
  const total = totalLearn + totalPractice + totalHard;
  const pct = Math.round((total / 420) * 100);

  document.getElementById('stat-learn').textContent = `${totalLearn}/147`;
  document.getElementById('stat-practice').textContent = `${totalPractice}/210`;
  document.getElementById('stat-hard').textContent = `${totalHard}/63`;
  document.getElementById('stat-total').textContent = `${total}/420`;
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('global-pct').textContent = pct + '%';

  container.innerHTML = PATTERNS.map(p => renderPattern(p)).join('');

  // Bind events
  PATTERNS.forEach(p => {
    // Header click
    document.getElementById(`header-${p.id}`).addEventListener('click', () => {
      if (openPatterns.has(p.id)) openPatterns.delete(p.id);
      else openPatterns.add(p.id);
      render();
    });

    // Problem clicks
    ['learn','practice','hard'].forEach((phase, phaseIdx) => {
      const arr = phase === 'learn' ? p.learn : phase === 'practice' ? p.practice : p.hard;
      arr.forEach((prob, idx) => {
        const rowEl = document.getElementById(`row-${p.id}-${phase}-${idx}`);
        if (rowEl) {
          rowEl.addEventListener('click', (e) => {
            if (e.target.classList.contains('tip-toggle') || e.target.classList.contains('lc-link') || e.target.classList.contains('pattern-recog-toggle')) return;
            toggleCheck(p.id, phase, idx);
          });
        }
        if (prob.tip) {
          const btn = document.getElementById(`tip-btn-${p.id}-${phase}-${idx}`);
          const box = document.getElementById(`tip-box-${p.id}-${phase}-${idx}`);
          if (btn && box) {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              box.classList.toggle('visible');
              btn.textContent = box.classList.contains('visible') ? '▲ hide tip' : '▼ show tip';
            });
          }
        }
        if (phase === 'learn' && prob.pattern) {
          const recogBtn = document.getElementById(`recog-btn-${p.id}-${idx}`);
          const recogBox = document.getElementById(`recog-box-${p.id}-${idx}`);
          if (recogBtn && recogBox) {
            recogBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              recogBox.classList.toggle('visible');
              recogBtn.textContent = recogBox.classList.contains('visible') ? '▲ hide pattern' : '▼ pattern recognition';
            });
          }
        }
      });
    });
  });
}

function renderPattern(p) {
  const done = countAllDone(p.id);
  const pct = Math.round((done / 20) * 100);
  const isOpen = openPatterns.has(p.id);
  const isComplete = done === 20;

  return `
    <div class="pattern-card ${isOpen ? 'open' : ''} ${isComplete ? 'completed' : ''}">
      <div class="pattern-header" id="header-${p.id}">
        <span class="pattern-num">${String(p.id).padStart(2,'0')}</span>
        <span class="pattern-name">${p.name}</span>
        <div class="pattern-progress">
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
          <span class="mini-count">${done}/20</span>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="pattern-body">
        ${renderPhase(p, 'learn', p.learn, '01–07', 'Study & Copy', 'Read the solution, understand the pattern, copy and annotate it.')}
        ${renderPhase(p, 'practice', p.practice, '08–17', 'Medium Practice', 'Apply the templates from phase 1. No copying — try from memory.')}
        ${renderPhase(p, 'hard', p.hard, '18–20', 'Challenge', 'These need a nudge. Expand the tip before you look at solutions.')}
        <button class="reset-btn" onclick="resetPattern(${p.id})">↺ Reset pattern progress</button>
      </div>
    </div>
  `;
}

function renderPhase(p, phase, problems, range, label, desc) {
  return `
    <div class="phase-section phase-${phase}">
      <div class="phase-header">
        <span class="phase-badge">${range} · ${label}</span>
        <span class="phase-desc">${desc}</span>
      </div>
      ${problems.map((prob, idx) => renderProblem(p, phase, prob, idx)).join('')}
    </div>
  `;
}

function renderProblem(p, phase, prob, idx) {
  const done = isChecked(p.id, phase, idx);
  const hasPatternRecog = phase === 'learn' && prob.pattern;
  let linkedHtml = '';
  if (hasPatternRecog && prob.linkedPractice && prob.linkedPractice.length > 0) {
    const links = prob.linkedPractice.map(pi => {
      const practice = p.practice[pi];
      return practice ? `<span class="linked-badge">→ ${practice.name}</span>` : '';
    }).join('');
    linkedHtml = `<div style="margin-top:4px"><div class="recog-label">LINKED PRACTICE</div><div>${links}</div></div>`;
  }
  return `
    <div class="problem-row ${done ? 'done' : ''}" id="row-${p.id}-${phase}-${idx}">
      <div class="check-box">${done ? '✓' : ''}</div>
      <div class="problem-content">
        <div class="problem-name">${prob.name}</div>
        <div class="problem-meta">
          <span class="diff-badge diff-${prob.diff}">${prob.diff}</span>
          <a class="lc-link" href="https://leetcode.com/problems/" target="_blank" onclick="event.stopPropagation()">LC #${prob.lc} ↗</a>
        </div>
        ${prob.tip ? `
          <button class="tip-toggle" id="tip-btn-${p.id}-${phase}-${idx}">▼ show tip</button>
          <div class="tip-box" id="tip-box-${p.id}-${phase}-${idx}">${prob.tip}</div>
        ` : ''}
        ${hasPatternRecog ? `
          <button class="pattern-recog-toggle" id="recog-btn-${p.id}-${idx}">▼ pattern recognition</button>
          <div class="pattern-recog-box" id="recog-box-${p.id}-${idx}">
            <div class="recog-label">PATTERN CUE</div>
            <div class="recog-text">${prob.pattern}</div>
            <div class="recog-label">INTUITION</div>
            <div class="recog-text">${prob.intuition}</div>
            ${linkedHtml}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function resetPattern(id) {
  if (!confirm(`Reset all progress for this pattern?`)) return;
  Object.keys(state).forEach(k => {
    if (k.startsWith(`p${id}_`)) delete state[k];
  });
  saveState(state);
  render();
}

function expandAll() {
  PATTERNS.forEach(p => openPatterns.add(p.id));
  render();
}
function collapseAll() {
  openPatterns.clear();
  render();
}

render();
</script>
