<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Pattern Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f7916a;
    --accent3: #6af7b8;
    --learn: #7c6af7;
    --practice: #f7c06a;
    --hard: #f7916a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --done-bg: #1a2a1a;
    --done-border: #2a4a2a;
    --done-text: #6af7b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  header {
    margin-bottom: 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .title-row {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    padding-bottom: 4px;
  }

  /* OVERALL PROGRESS */
  .overall-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat-learn .stat-num { color: var(--learn); }
  .stat-practice .stat-num { color: var(--practice); }
  .stat-hard .stat-num { color: var(--hard); }
  .stat-total .stat-num { color: var(--accent3); }

  /* GLOBAL PROGRESS BAR */
  .global-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .global-bar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }
  .global-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* PATTERN CARD */
  .pattern-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .pattern-card:hover { border-color: var(--accent); }
  .pattern-card.completed { border-color: var(--done-border); }

  .pattern-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .pattern-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 28px;
  }

  .pattern-name {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex: 1;
  }

  .pattern-progress {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mini-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .mini-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.3s;
  }
  .mini-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
  }

  .chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }
  .pattern-card.open .chevron { transform: rotate(180deg); }

  /* PATTERN BODY */
  .pattern-body {
    display: none;
    padding: 0 24px 24px;
  }
  .pattern-card.open .pattern-body { display: block; }

  /* PHASE SECTIONS */
  .phase-section {
    margin-bottom: 20px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .phase-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .phase-learn .phase-badge { background: rgba(124,106,247,0.15); color: var(--learn); border: 1px solid rgba(124,106,247,0.3); }
  .phase-practice .phase-badge { background: rgba(247,192,106,0.15); color: var(--practice); border: 1px solid rgba(247,192,106,0.3); }
  .phase-hard .phase-badge { background: rgba(247,145,106,0.15); color: var(--hard); border: 1px solid rgba(247,145,106,0.3); }

  .phase-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* PROBLEM ROWS */
  .problem-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .problem-row:hover { background: var(--surface2); }
  .problem-row.done { background: rgba(106,247,184,0.04); }

  .check-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 0.7rem;
  }
  .problem-row.done .check-box {
    background: var(--accent3);
    border-color: var(--accent3);
    color: #0a0a0f;
  }
  .phase-learn .problem-row.done .check-box { background: var(--learn); border-color: var(--learn); color: #fff; }
  .phase-practice .problem-row.done .check-box { background: var(--practice); border-color: var(--practice); color: #0a0a0f; }
  .phase-hard .problem-row.done .check-box { background: var(--hard); border-color: var(--hard); color: #fff; }

  .problem-content { flex: 1; min-width: 0; }

  .problem-name {
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .problem-row.done .problem-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .problem-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .diff-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .diff-easy { background: rgba(106,247,184,0.12); color: var(--accent3); }
  .diff-medium { background: rgba(247,192,106,0.12); color: var(--practice); }
  .diff-hard { background: rgba(247,145,106,0.12); color: var(--hard); }

  .lc-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .lc-link:hover { color: var(--accent); }

  /* TIPS */
  .tip-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--hard);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-decoration: underline dotted;
    transition: color 0.15s;
    margin-top: 2px;
    display: block;
  }
  .tip-toggle:hover { color: var(--accent2); }

  .tip-box {
    display: none;
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(247,145,106,0.07);
    border-left: 2px solid var(--hard);
    border-radius: 0 6px 6px 0;
    font-size: 0.75rem;
    color: var(--text);
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }
  .tip-box.visible { display: block; }

  /* RESET BTN */
  .reset-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--hard); color: var(--hard); }

  /* EXPAND ALL */
  .controls-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--text); }

  @media (max-width: 600px) {
    .pattern-header { padding: 16px; }
    .pattern-body { padding: 0 16px 16px; }
    .mini-bar { width: 50px; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-row">
      <h1>DSA Patterns</h1>
      <span class="subtitle">// 15 patterns · 20 problems each · 300 total</span>
    </div>
  </header>

  <div class="overall-stats">
    <div class="stat-box stat-learn">
      <div class="stat-num" id="stat-learn">0/105</div>
      <div class="stat-label">Learn Phase</div>
    </div>
    <div class="stat-box stat-practice">
      <div class="stat-num" id="stat-practice">0/150</div>
      <div class="stat-label">Practice Phase</div>
    </div>
    <div class="stat-box stat-hard">
      <div class="stat-num" id="stat-hard">0/45</div>
      <div class="stat-label">Challenge Phase</div>
    </div>
    <div class="stat-box stat-total">
      <div class="stat-num" id="stat-total">0/300</div>
      <div class="stat-label">Total Solved</div>
    </div>
  </div>

  <div class="global-bar-wrap">
    <span class="global-bar-label">OVERALL PROGRESS</span>
    <div class="bar-track"><div class="bar-fill" id="global-bar"></div></div>
    <span class="global-pct" id="global-pct">0%</span>
  </div>

  <div class="controls-row">
    <button class="ctrl-btn" onclick="expandAll()">↓ Expand All</button>
    <button class="ctrl-btn" onclick="collapseAll()">↑ Collapse All</button>
  </div>

  <div id="patterns-container"></div>
</div>

const STORAGE_KEY = 'dsa_tracker_v2';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function getProblemKey(patternId, phase, idx) {
  return `p${patternId}_${phase}_${idx}`;
}

function isChecked(patternId, phase, idx) {
  return !!state[getProblemKey(patternId, phase, idx)];
}

function toggleCheck(patternId, phase, idx) {
  const key = getProblemKey(patternId, phase, idx);
  state[key] = !state[key];
  saveState(state);
  render();
}

function countDone(patternId, phase, total) {
  let count = 0;
  for (let i = 0; i < total; i++) {
    if (isChecked(patternId, phase, i)) count++;
  }
  return count;
}

function countAllDone(patternId) {
  return countDone(patternId,'learn',7) + countDone(patternId,'practice',10) + countDone(patternId,'hard',3);
}

let openPatterns = new Set([1]); // first open by default

function render() {
  const container = document.getElementById('patterns-container');

  // Stats
  let totalLearn = 0, totalPractice = 0, totalHard = 0;
  PATTERNS.forEach(p => {
    totalLearn += countDone(p.id, 'learn', 7);
    totalPractice += countDone(p.id, 'practice', 10);
    totalHard += countDone(p.id, 'hard', 3);
  });
  const total = totalLearn + totalPractice + totalHard;
  const pct = Math.round((total / 300) * 100);

  document.getElementById('stat-learn').textContent = `${totalLearn}/105`;
  document.getElementById('stat-practice').textContent = `${totalPractice}/150`;
  document.getElementById('stat-hard').textContent = `${totalHard}/45`;
  document.getElementById('stat-total').textContent = `${total}/300`;
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('global-pct').textContent = pct + '%';

  container.innerHTML = PATTERNS.map(p => renderPattern(p)).join('');

  // Bind events
  PATTERNS.forEach(p => {
    // Header click
    document.getElementById(`header-${p.id}`).addEventListener('click', () => {
      if (openPatterns.has(p.id)) openPatterns.delete(p.id);
      else openPatterns.add(p.id);
      render();
    });

    // Problem clicks
    ['learn','practice','hard'].forEach((phase, phaseIdx) => {
      const arr = phase === 'learn' ? p.learn : phase === 'practice' ? p.practice : p.hard;
      arr.forEach((prob, idx) => {
        const rowEl = document.getElementById(`row-${p.id}-${phase}-${idx}`);
        if (rowEl) {
          rowEl.addEventListener('click', (e) => {
            if (e.target.classList.contains('tip-toggle') || e.target.classList.contains('lc-link')) return;
            toggleCheck(p.id, phase, idx);
          });
        }
        if (prob.tip) {
          const btn = document.getElementById(`tip-btn-${p.id}-${phase}-${idx}`);
          const box = document.getElementById(`tip-box-${p.id}-${phase}-${idx}`);
          if (btn && box) {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              box.classList.toggle('visible');
              btn.textContent = box.classList.contains('visible') ? '▲ hide tip' : '▼ show tip';
            });
          }
        }
      });
    });
  });
}

function renderPattern(p) {
  const done = countAllDone(p.id);
  const pct = Math.round((done / 20) * 100);
  const isOpen = openPatterns.has(p.id);
  const isComplete = done === 20;

  return `
    <div class="pattern-card ${isOpen ? 'open' : ''} ${isComplete ? 'completed' : ''}">
      <div class="pattern-header" id="header-${p.id}">
        <span class="pattern-num">${String(p.id).padStart(2,'0')}</span>
        <span class="pattern-name">${p.name}</span>
        <div class="pattern-progress">
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
          <span class="mini-count">${done}/20</span>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="pattern-body">
        ${renderPhase(p, 'learn', p.learn, '01–07', 'Study & Copy', 'Read the solution, understand the pattern, copy and annotate it.')}
        ${renderPhase(p, 'practice', p.practice, '08–17', 'Medium Practice', 'Apply the templates from phase 1. No copying — try from memory.')}
        ${renderPhase(p, 'hard', p.hard, '18–20', 'Challenge', 'These need a nudge. Expand the tip before you look at solutions.')}
        <button class="reset-btn" onclick="resetPattern(${p.id})">↺ Reset pattern progress</button>
      </div>
    </div>
  `;
}

function renderPhase(p, phase, problems, range, label, desc) {
  return `
    <div class="phase-section phase-${phase}">
      <div class="phase-header">
        <span class="phase-badge">${range} · ${label}</span>
        <span class="phase-desc">${desc}</span>
      </div>
      ${problems.map((prob, idx) => renderProblem(p, phase, prob, idx)).join('')}
    </div>
  `;
}

function renderProblem(p, phase, prob, idx) {
  const done = isChecked(p.id, phase, idx);
  return `
    <div class="problem-row ${done ? 'done' : ''}" id="row-${p.id}-${phase}-${idx}">
      <div class="check-box">${done ? '✓' : ''}</div>
      <div class="problem-content">
        <div class="problem-name">${prob.name}</div>
        <div class="problem-meta">
          <span class="diff-badge diff-${prob.diff}">${prob.diff}</span>
          <a class="lc-link" href="https://leetcode.com/problems/" target="_blank" onclick="event.stopPropagation()">LC #${prob.lc} ↗</a>
        </div>
        ${prob.tip ? `
          <button class="tip-toggle" id="tip-btn-${p.id}-${phase}-${idx}">▼ show tip</button>
          <div class="tip-box" id="tip-box-${p.id}-${phase}-${idx}">${prob.tip}</div>
        ` : ''}
      </div>
    </div>
  `;
}

function resetPattern(id) {
  if (!confirm(`Reset all progress for this pattern?`)) return;
  Object.keys(state).forEach(k => {
    if (k.startsWith(`p${id}_`)) delete state[k];
  });
  saveState(state);
  render();
}

function expandAll() {
  PATTERNS.forEach(p => openPatterns.add(p.id));
  render();
}
function collapseAll() {
  openPatterns.clear();
  render();
}

render();
</script>
</body>
</html>
